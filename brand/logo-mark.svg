<svg width="120" height="132" viewBox="0 0 64 72" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="LazyCreatives Uploader mark">
  <defs>
    <linearGradient id="tile" x1="0" y1="0" x2="0" y2="72" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#1C1F25"/><stop offset="1" stop-color="#0B0C0F"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="28%" r="62%">
      <stop offset="0" stop-color="#F5C451" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#F5C451" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- shield (shared family mark) -->
  <path d="M32 3 L57 13 V31 C57 47 47.5 57.5 32 61.5 C16.5 57.5 7 47 7 31 V13 Z"
