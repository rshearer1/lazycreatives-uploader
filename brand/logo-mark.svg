  <path d="M32 3 L57 13 V31 C57 47 47.5 57.5 32 61.5 C16.5 57.5 7 47 7 31 V13 Z" fill="url(#glow)"/>
  <!-- waveform bars (audio) -->
  <g stroke="#F5C451" stroke-width="3.2" stroke-linecap="round" opacity="0.85">
    <line x1="17" y1="36" x2="17" y2="42"/>
    <line x1="23" y1="31" x2="23" y2="47"/>
  </g>
  <g stroke="#F5C451" stroke-width="3.2" stroke-linecap="round" opacity="0.5">
    <line x1="47" y1="33" x2="47" y2="45"/>
  </g>
  <!-- upload arrow (vs Backups' verify check) -->
  <path d="M32 47 V31 M25 38 l7 -7 l7 7" stroke="#4ADE80" stroke-width="4"
        fill="none" stroke-linecap="round" stroke-linejoin="round"/>
